name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore "src/MineJason.slnx"
    - name: Build
      run: dotnet build "src/MineJason.slnx" --no-restore
    - name: Test
      run: dotnet test --project "src/MineJason.Tests/MineJason.Tests.csproj" --no-build --verbosity normal -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml --results-directory "${{ github.workspace }}/TestResults"
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ github.workspace }}/TestResults/coverage.cobertura.xml
        disable_search: true
        report_type: coverage
        