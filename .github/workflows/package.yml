name: Package project

on:
  release: 
    types: published

jobs:
  build:
    permissions:
      id-token: write

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        global-json-file: global.json
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Restore dependencies
      run: dotnet restore "src/MineJason.slnx"
    - name: Build
      run: dotnet build "src/MineJason.slnx" --no-restore --configuration Release
    - name: Test
      run: dotnet test --project "src/MineJason.Tests/MineJason.Tests.csproj" --configuration Release --no-build --verbosity normal
    - name: Pack
      run: scripts/pack.sh
    - name: Publish
      run: dotnet nuget push "bin/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate