name: Feature Request
description: Request a new feature
labels: [ "✨type: feature", "🦺state: untriaged" ]
body:
  - type: dropdown
    id: modules
    attributes:
      label: Which module/package(s) are this issue concerned with?
      options:
        - Client (MineJason)
        - NBT (MineJason.SNbt)
        - Serialization (MineJason.Serialization)
      multiple: true

  - type: textarea
    id: description
    label: Description
    description: Describe the new feature you want
    validations:
      required: true

  - type: textarea
    id: information
    label: Additional information